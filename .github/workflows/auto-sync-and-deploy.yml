name: Auto Sync and Deploy on Push to Main\n\non: push:\n  branches:\n    - main\n\njobs:\n  sync_and_deploy:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout repository\n        uses: actions/checkout@v2\n\n      - name: Sync with glass-wizard-studio\n        run: |\n          git remote add studio https://github.com/glass-wizard-studio/glass-wizard-studio.git\n          git fetch studio\n          git merge studio/main\n\n      - name: Deploy to Vercel\n        run: |\n          npm install -g vercel\n          vercel --prod\n\n